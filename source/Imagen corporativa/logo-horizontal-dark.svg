<svg viewBox="0 0 200 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Corexi Logo with Wordmark - Horizontal - Dark Background -->
  
  <!-- Icon -->
  <g transform="translate(0, 0) scale(0.5)">
    <line x1="50" y1="50" x2="20" y2="28" stroke="#2dd4bf" stroke-width="2"/>
    <line x1="50" y1="50" x2="20" y2="72" stroke="#2dd4bf" stroke-width="2"/>
    <line x1="50" y1="50" x2="75" y2="22" stroke="#2dd4bf" stroke-width="2"/>
    <circle cx="20" cy="28" r="5" fill="#2dd4bf"/>
    <circle cx="20" cy="72" r="5" fill="#2dd4bf"/>
    <circle cx="75" cy="22" r="6" fill="#2dd4bf"/>
    <circle cx="50" cy="50" r="14" fill="#2dd4bf"/>
  </g>
  
  <!-- Wordmark -->
  <text x="60" y="32" font-family="Outfit, Arial, sans-serif" font-size="18" font-weight="500" letter-spacing="4" fill="#2dd4bf">COREXI</text>
